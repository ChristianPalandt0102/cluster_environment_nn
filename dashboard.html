
<script>
/* ===============================
   NEURAL LINKS after satelite code
================================ */

const linkMaterial =
    new THREE.LineBasicMaterial({color:0x00ffcc});

const links = [];

const routingRing = [
"A1","A","B","C","D","E","F","F1","E","E1"
];

function findSat(name){
    return satellites.find(s=>s.userData.name===name);
}

function createLink(a,b){

    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(),
        new THREE.Vector3()
    ]);

    const line = new THREE.Line(geo,linkMaterial);
    scene.add(line);

    links.push({line,a,b,pulse:Math.random()});
}

// build ring
for(let i=0;i<routingRing.length-1;i++){
    createLink(routingRing[i], routingRing[i+1]);
}

function updateNeuralLinks(){

    links.forEach(L=>{

        const sa = findSat(L.a);
        const sb = findSat(L.b);

        if(!sa || !sb) return;

        const positions = [
            sa.position,
            sb.position
        ];

        L.line.geometry.setFromPoints(positions);

        // pulse brightness
        L.pulse += 0.05;
        const intensity = (Math.sin(L.pulse)+1)/2;

        L.line.material.opacity = intensity;
        L.line.material.transparent = true;
    });
}
</script>

<script>

/* ===============================
   DIVERGENCE HEATMAP
================================ */

const heatPoints = [];

function createHeatPoint(lat, lon){

    const geo = new THREE.SphereGeometry(0.015,8,8);
    const mat = new THREE.MeshBasicMaterial({
        color:0x00ff00,
        transparent:true,
        opacity:0.7
    });

    const p = new THREE.Mesh(geo,mat);

    const r = 1.02;

    const phi = (90-lat)*(Math.PI/180);
    const theta = (lon+180)*(Math.PI/180);

    p.position.set(
        -r*Math.sin(phi)*Math.cos(theta),
         r*Math.cos(phi),
         r*Math.sin(phi)*Math.sin(theta)
    );

    scene.add(p);

    heatPoints.push({
        mesh:p,
        divergence:0
    });
}

</script>
