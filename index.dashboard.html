<body>
<div id="console"></div>

<script type="text/python">
from browser import ajax

def fetch():
    def done(req):
        print(req.text)

    r = ajax.ajax()
    r.bind("complete", done)
    r.open("GET", "/output/live.json", True)
    r.send()

fetch()


</script>
