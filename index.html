

<script>
/* ===============================
   SANDBOX SATELLITES
================================ */

const satellites = [];
const satelliteGroup = new THREE.Group();
scene.add(satelliteGroup);

const boxes = [
"A","B","C","D","E","F",
"A1","B1","C1","D1","E1","F1"
];

function createSatellite(name, orbitRadius, speed, offset){

    const geo = new THREE.SphereGeometry(0.02,16,16);
    const mat = new THREE.MeshBasicMaterial({color:0x00ffcc});

    const sat = new THREE.Mesh(geo, mat);

    sat.userData = {
        name:name,
        radius:orbitRadius,
        speed:speed,
        angle:offset
    };

    satelliteGroup.add(sat);
    satellites.push(sat);
}

// create 12 twin boxes
boxes.forEach((b,i)=>{
    createSatellite(
        b,
        1.4 + (i%2)*0.15,
        0.002 + i*0.0002,
        i
    );
});
</script>

window.addEventListener("sandbox_signal", e => {

    const box = e.detail.box;

    const sat = satellites.find(
        s=>s.userData.name===box
    );

    if(!sat) return;

    sat.material.color.setHex(0xffaa00);

    setTimeout(()=>{
        sat.material.color.setHex(0x00ffcc);
    },400);
});


<script>

/* ===============================
   QUANTUM TRI-SINGULAR SYSTEM
================================ */

const quantumGroup = new THREE.Group();
scene.add(quantumGroup);

const quantumNodes = [];

function createQuantumNode(name, position){

    const geo = new THREE.OctahedronGeometry(0.06);
    const mat = new THREE.MeshBasicMaterial({
        color:0xff00ff,
        wireframe:true
    });

    const node = new THREE.Mesh(geo, mat);
    node.position.copy(position);

    node.userData = {
        name:name,
        phase:Math.random()*10
    };

    quantumGroup.add(node);
    quantumNodes.push(node);
}

</script>
