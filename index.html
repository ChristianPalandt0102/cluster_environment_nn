<script>

// ---------- THREE JS EARTH ----------

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Earth
const geometry = new THREE.SphereGeometry(1,64,64);

const texture = new THREE.TextureLoader().load(
 "https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"
);

const material = new THREE.MeshBasicMaterial({map:texture});
const earth = new THREE.Mesh(geometry, material);

scene.add(earth);

// Stars
const starsGeometry = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<10000;i++){
    starVertices.push(
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000
    );
}

starsGeometry.setAttribute(
 'position',
 new THREE.Float32BufferAttribute(starVertices,3)
);

const stars = new THREE.Points(
    starsGeometry,
    new THREE.PointsMaterial({size:0.5})
);

scene.add(stars);

// animation
function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.0015;
    renderer.render(scene,camera);
}

animate();

</script>

<script>


function latLonToVector3(lat, lon, radius) {

    const phi = (90 - lat) * (Math.PI/180);
    const theta = (lon + 180) * (Math.PI/180);

    return new THREE.Vector3(
        -(radius * Math.sin(phi) * Math.cos(theta)),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

// Aachen example
const markerGeo = new THREE.SphereGeometry(0.01,8,8);
const markerMat = new THREE.MeshBasicMaterial({color:0x00ffcc});

const aachen = new THREE.Mesh(markerGeo, markerMat);
aachen.position.copy(latLonToVector3(50.7753, 6.0839, 1.01));

scene.add(aachen);




/* ===============================
   SANDBOX SATELLITES
================================ */

const satellites = [];
const satelliteGroup = new THREE.Group();
scene.add(satelliteGroup);

const boxes = [
"A","B","C","D","E","F",
"A1","B1","C1","D1","E1","F1"
];

function createSatellite(name, orbitRadius, speed, offset){

    const geo = new THREE.SphereGeometry(0.02,16,16);
    const mat = new THREE.MeshBasicMaterial({color:0x00ffcc});

    const sat = new THREE.Mesh(geo, mat);

    sat.userData = {
        name:name,
        radius:orbitRadius,
        speed:speed,
        angle:offset
    };

    satelliteGroup.add(sat);
    satellites.push(sat);
}

// create 12 twin boxes
boxes.forEach((b,i)=>{
    createSatellite(
        b,
        1.4 + (i%2)*0.15,
        0.002 + i*0.0002,
        i
    );
});
</script>

window.addEventListener("sandbox_signal", e => {

    const box = e.detail.box;

    const sat = satellites.find(
        s=>s.userData.name===box
    );

    if(!sat) return;

    sat.material.color.setHex(0xffaa00);

    setTimeout(()=>{
        sat.material.color.setHex(0x00ffcc);
    },400);
});


<script>

/* ===============================
   QUANTUM TRI-SINGULAR SYSTEM
================================ */

const quantumGroup = new THREE.Group();
scene.add(quantumGroup);

const quantumNodes = [];

function createQuantumNode(name, position){

    const geo = new THREE.OctahedronGeometry(0.06);
    const mat = new THREE.MeshBasicMaterial({
        color:0xff00ff,
        wireframe:true
    });

    const node = new THREE.Mesh(geo, mat);
    node.position.copy(position);

    node.userData = {
        name:name,
        phase:Math.random()*10
    };

    quantumGroup.add(node);
    quantumNodes.push(node);
}

</script>
